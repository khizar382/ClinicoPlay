<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | ClinicoPlay</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>❓</text></svg>">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1" style="width: 960px; height: 600px;"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-percent">0%</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-loading-text">Preparing assets...</div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 22 7 12 12 2 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
        </div>
        <div id="unity-fullscreen-button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
          </svg>
        </div>
        <div id="unity-build-title">ClinicoPlay</div>
      </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
      // YOUR FIREBASE CONFIGURATION
      const firebaseConfig = {
        apiKey: "AIzaSyAvKGHsLjCXY-I5-7SP8UIq9VmJ5qohBhg",
        authDomain: "quiz-online-5bcd1.firebaseapp.com",
        projectId: "quiz-online-5bcd1",
        storageBucket: "quiz-online-5bcd1.firebasestorage.app",
        messagingSenderId: "1051342331393",
        appId: "1:1051342331393:web:89d8d12bdbf346713f6a00"
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/56bccb374d7be3700981e1775cc19f6d.loader.js";
      var config = {
        dataUrl: buildUrl + "/592b7eb8b1359cc61479e068a8d686a6.data.unityweb",
        frameworkUrl: buildUrl + "/73f943d84350dfbf6ddfea6c8105b447.framework.js.unityweb",
        codeUrl: buildUrl + "/8a64f382031d49216d1c1fab2d71a2f8.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "ClinicoPlay",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      var myUnityInstance = null;

      script.onload = () => {
        // Cap the resolution at 2x pixel ratio for high-DPI screens
        const pixelRatio = Math.min(window.devicePixelRatio, 2);
        
        createUnityInstance(canvas, config, (progress) => {
          var percent = Math.round(progress * 100);
          progressBarFull.style.width = percent + "%";
          document.querySelector("#unity-progress-percent").innerText = percent + "%";
          
          var statusText = document.querySelector("#unity-loading-text");
          if (progress < 0.2) {
            statusText.innerText = "Downloading game assets...";
          } else if (progress < 0.5) {
            statusText.innerText = "Loading quiz database & audio...";
          } else if (progress < 0.8) {
            statusText.innerText = "Compiling WebGL code...";
          } else {
            statusText.innerText = "Launching Quiz Game...";
          }
        }).then((unityInstance) => {
          myUnityInstance = unityInstance;
          loadingBar.style.opacity = 0;
          setTimeout(() => {
            loadingBar.style.display = "none";
            container.classList.add("unity-loaded");
          }, 600);
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
document.body.appendChild(script);

      // --- FIREBASE BRIDGE FUNCTIONS ---
      window.firebaseRegisterUser = async (email, password, obj, cb, fb) => {
          try {
              await firebase.auth().createUserWithEmailAndPassword(email, password);
              myUnityInstance.SendMessage(obj, cb, "Account created successfully!");
          } catch (error) {
              myUnityInstance.SendMessage(obj, fb, error.message);
          }
      };

      window.firebaseLoginUser = async (email, password, obj, cb, fb) => {
          try {
              await firebase.auth().signInWithEmailAndPassword(email, password);
              myUnityInstance.SendMessage(obj, cb, "Logged in successfully!");
          } catch (error) {
              myUnityInstance.SendMessage(obj, fb, error.message);
          }
      };

      window.firebaseGoogleLogin = async (obj, cb, fb) => {
          try {
              const provider = new firebase.auth.GoogleAuthProvider();
              await firebase.auth().signInWithPopup(provider);
              myUnityInstance.SendMessage(obj, cb, "Google login successful!");
          } catch (error) {
              myUnityInstance.SendMessage(obj, fb, error.message);
          }
      };
    </script>
  </body>
</html>
